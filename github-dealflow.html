<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haltra Group — Deal Pipeline</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;
  --border:#e4e4e0;--border2:#d0d0cc;
  --blue:#1a5fb4;--blue-light:#e8f0fc;
  --green:#1d7a4a;--green-light:#e6f5ec;
  --amber:#8a5c00;--amber-light:#fef3d0;
  --red:#b91c1c;--red-light:#fdeaea;
  --purple:#5b3fbe;--purple-light:#eeedfb;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg2);min-height:100vh}
/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo .wordmark{font-size:13px;font-weight:600;letter-spacing:.05em;color:var(--text)}
.sidebar-logo .sub{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:background .1s}
.nav-item:hover{background:var(--bg2)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.nav-icon{font-size:16px;width:18px;text-align:center}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500}
.topbar-actions{display:flex;gap:8px}
.content{padding:24px;flex:1}
/* CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.stat-value{font-size:22px;font-weight:600;color:var(--text)}
/* BUTTONS */
button{font-family:inherit;cursor:pointer;font-size:13px}
.btn{padding:7px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--bg);color:var(--text);transition:background .1s}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1650a0}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:5px}
.btn-danger{border-color:#fca5a5;color:var(--red);background:var(--bg)}
.btn-danger:hover{background:var(--red-light)}
/* TABLE */
.table-wrap{background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.toolbar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.toolbar input{min-width:200px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;border-bottom:1px solid var(--border);font-weight:500;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;background:var(--bg2)}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-coi{background:var(--blue-light);color:var(--blue)}
.badge-cv{background:var(--green-light);color:var(--green)}
.badge-pipeline{background:var(--bg3);color:var(--text2)}
.badge-logged{background:var(--bg3);color:var(--text2)}
.badge-progress{background:var(--amber-light);color:var(--amber)}
.badge-pass{background:var(--red-light);color:var(--red)}
.badge-new{background:var(--purple-light);color:var(--purple)}
/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:6px}
.bar-track{width:50px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
/* FORM */
.form-section{margin-bottom:20px}
.section-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--text2)}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.field textarea{resize:vertical;min-height:64px}
.field select{appearance:auto}
.score-block{display:flex;align-items:center;gap:16px;margin-top:16px;padding:14px;background:var(--bg2);border-radius:8px}
.score-num{font-size:28px;font-weight:600}
.score-num.good{color:var(--green)}
.score-num.avg{color:var(--amber)}
.score-num.bad{color:var(--red)}
/* DETAIL PANEL */
.detail-panel{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:18px;margin-top:16px}
.detail-panel h3{font-size:14px;font-weight:600;margin-bottom:12px}
.kv-grid{display:grid;grid-template-columns:130px 1fr;gap:5px 12px;font-size:13px}
.kv-key{color:var(--text2)}
.kv-val{font-weight:500;word-break:break-word}
/* RF GRID */
.rf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:8px}
.rf-item{display:flex;align-items:center;gap:7px;font-size:12px}
.rf-item input[type=checkbox]{width:auto}
/* MODAL / OVERLAY */
.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:center;z-index:100;overflow:auto;padding:32px 16px}
.modal-wrap.hidden{display:none}
.modal{background:var(--bg);border-radius:12px;width:100%;max-width:780px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:15px;font-weight:600}
.modal-body{padding:22px;max-height:80vh;overflow:auto}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
/* LOADING */
.loading{text-align:center;padding:48px;color:var(--text3)}
.empty{text-align:center;padding:48px;color:var(--text3)}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
.login-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:32px;width:360px}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.login-field input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-size:14px;font-family:inherit}
.login-err{font-size:12px;color:var(--red);margin-top:8px;min-height:18px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-card">
    <h1>Haltra Group</h1>
    <p>Deal Pipeline — sign in to continue</p>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="name@haltragroup.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="login-err" id="login-err"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">Sign in</button>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text3)">First time? <a href="#" onclick="doSignup()" style="color:var(--blue)">Create account</a></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="shell" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">HALTRA GROUP</div>
      <div class="sub">Deal Pipeline</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="showTab('pipeline')" id="nav-pipeline">
        <span class="nav-icon">⊞</span> Pipeline CRM
      </div>
      <div class="nav-item" onclick="showTab('coi')" id="nav-coi">
        <span class="nav-icon">+</span> New COI
      </div>
      <div class="nav-item" onclick="showTab('cv')" id="nav-cv">
        <span class="nav-icon">↻</span> New CV
      </div>
      <div class="nav-item" onclick="showTab('stats')" id="nav-stats">
        <span class="nav-icon">▦</span> Stats
      </div>
    </nav>
    <div class="sidebar-footer" id="sidebar-user"></div>
  </div>

  <div class="main">
    <!-- PIPELINE TAB -->
    <div id="tab-pipeline">
      <div class="topbar">
        <div class="topbar-title">Pipeline CRM</div>
        <div class="topbar-actions">
          <button class="btn btn-sm" onclick="exportCSV()">↓ Export CSV</button>
          <button class="btn btn-sm btn-primary" onclick="openModal('coi')">+ New deal</button>
        </div>
      </div>
      <div class="content">
        <div class="stat-row" id="stat-row"></div>
        <div class="table-wrap">
          <div class="toolbar">
            <input type="text" id="search" placeholder="Search company, sponsor, sector…" oninput="renderTable()">
            <select id="filter-type" onchange="renderTable()">
              <option value="">All types</option>
              <option value="COI">COI</option>
              <option value="CV">CV</option>
              <option value="PIPELINE">Pipeline</option>
            </select>
            <select id="filter-status" onchange="renderTable()">
              <option value="">All statuses</option>
              <option value="New">New</option>
              <option value="In progress">In progress</option>
              <option value="Pass">Pass</option>
              <option value="Logged">Logged</option>
            </select>
            <select id="filter-sector" onchange="renderTable()">
              <option value="">All sectors</option>
            </select>
          </div>
          <div id="table-area"><div class="loading">Loading deals…</div></div>
        </div>
        <div id="detail-area"></div>
      </div>
    </div>

    <!-- COI TAB -->
    <div id="tab-coi" style="display:none">
      <div class="topbar">
        <div class="topbar-title">New Co-Investment</div>
      </div>
      <div class="content">
        <div id="coi-form"></div>
      </div>
    </div>

    <!-- CV TAB -->
    <div id="tab-cv" style="display:none">
      <div class="topbar">
        <div class="topbar-title">New Continuation Vehicle</div>
      </div>
      <div class="content">
        <div id="cv-form"></div>
      </div>
    </div>

    <!-- STATS TAB -->
    <div id="tab-stats" style="display:none">
      <div class="topbar">
        <div class="topbar-title">Pipeline statistics</div>
      </div>
      <div class="content" id="stats-content"></div>
    </div>
  </div>
</div>

<!-- DEAL MODAL -->
<div class="modal-wrap hidden" id="deal-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">New deal</h2>
      <button class="btn btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="calcScore()">Calculate score</button>
      <button class="btn btn-primary" onclick="saveDeal()">Save to pipeline</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://xgkiucepiemjbtgbwsqq.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhna2l1Y2VwaWVtamJ0Z2J3c3FxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODExMzgsImV4cCI6MjA5NzI1NzEzOH0.Cf5XsbUKcuXNdr4mi2jSIYIRIwjkFXNvbvakwyBDWFg';
const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

let deals = [];
let currentUser = null;
let modalType = 'coi';
let seeded = false;

// ── AUTH ──────────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  }
  db.auth.onAuthStateChange((event, session) => {
    if (session) { currentUser = session.user; showApp(); }
    else { showLogin(); }
  });
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-err').textContent = '';
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) document.getElementById('login-err').textContent = error.message;
}

async function doSignup() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-err').textContent = '';
  if (!email || !pass) { document.getElementById('login-err').textContent = 'Enter email and password first'; return; }
  const { error } = await db.auth.signUp({ email, password: pass });
  if (error) document.getElementById('login-err').textContent = error.message;
  else document.getElementById('login-err').textContent = 'Check your email to confirm signup, then sign in.';
}

async function signOut() {
  await db.auth.signOut();
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  const email = currentUser?.email || '';
  document.getElementById('sidebar-user').innerHTML = `<div style="margin-bottom:4px">${email}</div><a href="#" onclick="signOut()" style="color:var(--blue);font-size:11px">Sign out</a>`;
  loadDeals();
  buildCOIForm();
  buildCVForm();
}

// ── DATA ──────────────────────────────────────────────────────
async function loadDeals() {
  const { data, error } = await db.from('deals').select('*').order('entry_date', { ascending: false });
  if (error) { toast('Error loading deals: ' + error.message); return; }
  deals = data || [];
  if (!seeded && deals.length === 0) await seedPipeline();
  renderTable();
  populateSectorFilter();
}

async function seedPipeline() {
  seeded = true;
  toast('Loading 948 historic deals — please wait…');
  try {
    const b64 = PIPELINE_B64;
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const ds = new DecompressionStream('deflate');
    const writer = ds.writable.getWriter();
    writer.write(bytes);
    writer.close();
    const reader = ds.readable.getReader();
    const chunks = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const total = chunks.reduce((a, c) => a + c.length, 0);
    const all = new Uint8Array(total);
    let offset = 0;
    for (const c of chunks) { all.set(c, offset); offset += c.length; }
    const json = new TextDecoder().decode(all);
    const pipelineDeals = JSON.parse(json);
    const rows = pipelineDeals.map(d => ({
      entry_date: d.date || null,
      type: 'PIPELINE',
      name: d.name,
      sponsor: d.sponsor || null,
      hq: d.hq || null,
      sector: d.sector || null,
      sub_sector: d.subSector || null,
      deal_type: d.dealType || null,
      region: d.region || null,
      description: d.desc || null,
      relevant: d.relevant || null,
      sourcing: d.sourcing || null,
      rev: d.rev || null,
      ebitda: d.ebitda || null,
      ev: d.ev || null,
      deal_size: d.dealSize || null,
      status: 'Logged',
      score: 0,
      red_flags: [],
      comments: '',
      logged_by: currentUser?.email || null
    }));
    const CHUNK = 200;
    for (let i = 0; i < rows.length; i += CHUNK) {
      const { error } = await db.from('deals').insert(rows.slice(i, i + CHUNK));
      if (error) console.warn('Seed chunk error:', error.message);
    }
    toast('Historic pipeline loaded — ' + rows.length + ' deals');
    await loadDeals();
  } catch (e) {
    console.error('Seed error', e);
    toast('Could not load historic data: ' + e.message);
  }
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();
  const ft = document.getElementById('filter-type')?.value || '';
  const fs = document.getElementById('filter-status')?.value || '';
  const fsec = document.getElementById('filter-sector')?.value || '';

  const filtered = deals.filter(d =>
    (!q || [d.name,d.sponsor,d.hq,d.sector,d.description].some(v => (v||'').toLowerCase().includes(q))) &&
    (!ft || d.type === ft) &&
    (!fs || d.status === fs) &&
    (!fsec || d.sector === fsec)
  );

  // Stats
  const scored = deals.filter(d => d.score > 0);
  const avgScore = scored.length ? (scored.reduce((a,d) => a + d.score, 0) / scored.length) : 0;
  document.getElementById('stat-row').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total deals</div><div class="stat-value">${deals.length.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">COI screened</div><div class="stat-value">${deals.filter(d=>d.type==='COI').length}</div></div>
    <div class="stat-card"><div class="stat-label">CVs screened</div><div class="stat-value">${deals.filter(d=>d.type==='CV').length}</div></div>
    <div class="stat-card"><div class="stat-label">Avg score</div><div class="stat-value" style="color:${scoreColor(avgScore)}">${scored.length ? avgScore.toFixed(2) : '—'}</div></div>
    <div class="stat-card"><div class="stat-label">In progress</div><div class="stat-value">${deals.filter(d=>d.status==='In progress').length}</div></div>
  `;

  if (!filtered.length) {
    document.getElementById('table-area').innerHTML = '<div class="empty">No deals match your filters.</div>';
    return;
  }

  const rows = filtered.slice(0, 200).map(d => {
    const sc = d.score > 0 ? d.score.toFixed(3) : '—';
    const pct = d.score > 0 ? (d.score / 2 * 100).toFixed(0) : 0;
    const typeBadge = d.type === 'COI' ? 'badge-coi' : d.type === 'CV' ? 'badge-cv' : 'badge-pipeline';
    const statusBadge = d.status === 'Pass' ? 'badge-pass' : d.status === 'In progress' ? 'badge-progress' : d.status === 'New' ? 'badge-new' : 'badge-logged';
    const rfFlag = d.red_flags?.length ? `<span style="color:var(--red);font-size:11px;margin-left:4px">⚑${d.red_flags.length}</span>` : '';
    const scoreHtml = d.score > 0 ? `<div class="score-bar"><span style="font-weight:500;color:${scoreColor(d.score)}">${sc}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${scoreColor(d.score)}"></div></div></div>` : '<span style="color:var(--text3)">—</span>';
    return `<tr onclick="viewDeal('${d.id}')" style="cursor:pointer">
      <td style="font-size:11px;color:var(--text3)">${(d.entry_date||'').slice(0,10)}</td>
      <td><strong>${esc(d.name)}</strong>${rfFlag}</td>
      <td style="color:var(--text2)">${esc(d.sponsor||'')}</td>
      <td style="color:var(--text2)">${esc(d.hq||'')}</td>
      <td style="color:var(--text2)">${esc(d.sector||'')}</td>
      <td><span class="badge ${typeBadge}">${d.type}</span></td>
      <td><span class="badge ${statusBadge}">${d.status||'Logged'}</span></td>
      <td>${scoreHtml}</td>
      <td onclick="event.stopPropagation()"><button class="btn btn-sm btn-danger" onclick="deleteDeal('${d.id}')">✕</button></td>
    </tr>`;
  }).join('');

  const more = filtered.length > 200 ? `<tr><td colspan="9" style="text-align:center;padding:10px;color:var(--text3);font-size:12px">Showing 200 of ${filtered.length} — refine search to see more</td></tr>` : '';

  document.getElementById('table-area').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Company</th><th>Sponsor</th><th>HQ</th><th>Sector</th><th>Type</th><th>Status</th><th>Score</th><th></th>
      </tr></thead>
      <tbody>${rows}${more}</tbody>
    </table>`;
}

function populateSectorFilter() {
  const sectors = [...new Set(deals.map(d => d.sector).filter(Boolean))].sort();
  const sel = document.getElementById('filter-sector');
  if (!sel) return;
  sel.innerHTML = '<option value="">All sectors</option>' + sectors.map(s => `<option value="${s}">${s}</option>`).join('');
}

function viewDeal(id) {
  const d = deals.find(x => x.id === id);
  if (!d) return;

async function deleteDeal(id) {
  if (!confirm('Remove this deal from the pipeline?')) return;
  const { error } = await db.from('deals').delete().eq('id', id);
  if (error) { toast('Error: ' + error.message); return; }
  deals = deals.filter(d => d.id !== id);
  renderTable();
  toast('Deal removed');
}

// ── MODALS / FORMS ────────────────────────────────────────────
function openModal(type) {
  modalType = type;
  document.getElementById('modal-title').textContent = type === 'coi' ? 'New Co-Investment' : 'New Continuation Vehicle';
  document.getElementById('modal-body').innerHTML = type === 'coi' ? coiFormHTML() : cvFormHTML();
  document.getElementById('deal-modal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('deal-modal').classList.add('hidden');
}

function showTab(tab) {
  ['pipeline','coi','cv','stats'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'flex' : 'none';
    document.getElementById('tab-' + t).style.flexDirection = 'column';
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'stats') renderStats();
  if (tab === 'coi') openModal('coi');
  if (tab === 'cv') openModal('cv');
  if (tab === 'pipeline') renderTable();
}

function buildCOIForm() { document.getElementById('coi-form').innerHTML = coiFormHTML(); }
function buildCVForm() { document.getElementById('cv-form').innerHTML = cvFormHTML(); }

function sel(id, label, vals, def, labels) {
  const opts = vals.map((v,i) => `<option value="${v}"${v===def?' selected':''}>${labels?labels[i]:v}</option>`).join('');
  return `<div class="field"><label>${label}</label><select id="${id}">${opts}</select></div>`;
}

function rf(id, label) {
  return `<div class="rf-item"><input type="checkbox" id="${id}"><label for="${id}">${label}</label></div>`;
}

function gv(id) { return parseFloat(document.getElementById(id)?.value || 0) || 0; }
function gc(id) { return document.getElementById(id)?.checked || false; }
function gi(id) { return document.getElementById(id)?.value || ''; }

function calcScore() {
  let score = 0;
  if (modalType === 'coi') {
    const gp = (gv('s-gp')+gv('s-tr')+gv('s-se')+gv('s-ge')+gv('s-vc')+gv('s-syn'))/6;
    const asset = (gv('s-smm')+gv('s-rg')+gv('s-em')+gv('s-mgmt')+gv('s-val')+gv('s-ret')+gv('s-vcp'))/7;
    const terms = (gv('s-feq')+gv('s-mf')+gv('s-carr')+gv('s-hf')+gv('s-mi')+gv('s-or'))/6;
    score = (gp + asset + terms) / 3;
  } else {
    const gp = (gv('s-gp')+gv('s-tr')+gv('s-lp')+gv('s-se')+gv('s-ge')+gv('s-rgp')+gv('s-rcv'))/7;
    const asset = (gv('s-smm')+gv('s-star')+gv('s-rg')+gv('s-em')+gv('s-mgmt')+gv('s-val')+gv('s-ret')+gv('s-li')+gv('s-vcp'))/9;
    const terms = (gv('s-gpc')+gv('s-fcr')+gv('s-mf')+gv('s-carr')+gv('s-hf')+gv('s-mi')+gv('s-lpr')+gv('s-or'))/8;
    score = (gp + asset + terms) / 3;
  }
  const el = document.getElementById('score-display');
  if (el) {
    el.textContent = score.toFixed(3);
    el.className = 'score-num ' + (score >= 0.7 ? 'good' : score >= 0.6 ? 'avg' : 'bad');
  }
  return score;
}

function getRedFlags() {
  const ids = modalType === 'coi'
    ? ['rf-ol','rf-li','rf-pg','rf-sx']
    : ['rf-ol','rf-kpi','rf-li','rf-pd','rf-liq','rf-pg','rf-sx'];
  const labels = {
    'rf-ol':'Overleverage','rf-li':'Limited info','rf-pg':'Poor governance','rf-sx':'Sponsor w/o exp',
    'rf-kpi':'Poor op. KPIs','rf-pd':'Limited price disc.','rf-liq':'CV for liq. reasons'
  };
  return ids.filter(id => gc(id)).map(id => labels[id]);
}

async function saveDeal() {
  const name = gi('f-name').trim();
  if (!name) { toast('Please enter a company name'); return; }
  const score = calcScore();
  const row = {
    entry_date: new Date().toISOString().split('T')[0],
    type: modalType.toUpperCase(),
    name,
    sponsor: gi('f-sponsor') || null,
    hq: gi('f-hq') || null,
    sector: gi('f-sector') || null,
    region: gi('f-region') || null,
    description: gi('f-desc') || null,
    rev: parseFloat(gi('f-rev')) || null,
    ebitda: parseFloat(gi('f-ebitda')) || null,
    ev: parseFloat(gi('f-ev')) || null,
    deal_size: parseFloat(gi('f-size')) || null,
    status: gi('f-status') || 'New',
    score,
    red_flags: getRedFlags(),
    comments: gi('f-comments') || null,
    logged_by: currentUser?.email || null
  };
  const { data, error } = await db.from('deals').insert([row]).select();
  if (error) { toast('Error saving: ' + error.message); return; }
  deals.unshift(data[0]);
  closeModal();
  showTab('pipeline');
  toast('Deal saved to pipeline');
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats() {
  const coi = deals.filter(d => d.type === 'COI');
  const cv = deals.filter(d => d.type === 'CV');
  const scored = deals.filter(d => d.score > 0);
  const avgScore = scored.length ? (scored.reduce((a,d) => a+d.score, 0)/scored.length) : 0;

  const byStatus = {};
  deals.forEach(d => { byStatus[d.status] = (byStatus[d.status]||0)+1; });
  const bySector = {};
  deals.filter(d => d.sector).forEach(d => { bySector[d.sector] = (bySector[d.sector]||0)+1; });
  const topSectors = Object.entries(bySector).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxSec = topSectors[0]?.[1] || 1;

  const scoreBuckets = {'<0.50':0,'0.50-0.60':0,'0.60-0.70':0,'0.70-0.80':0,'0.80+':0};
  scored.forEach(d => {
    if (d.score < 0.5) scoreBuckets['<0.50']++;
    else if (d.score < 0.6) scoreBuckets['0.50-0.60']++;
    else if (d.score < 0.7) scoreBuckets['0.60-0.70']++;
    else if (d.score < 0.8) scoreBuckets['0.70-0.80']++;
    else scoreBuckets['0.80+']++;
  });
  const maxBucket = Math.max(...Object.values(scoreBuckets)) || 1;

  const top10 = [...coi,...cv].filter(d=>d.score>0).sort((a,b)=>b.score-a.score).slice(0,10);

  document.getElementById('stats-content').innerHTML = `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-label">Total pipeline</div><div class="stat-value">${deals.length.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">COI screened</div><div class="stat-value">${coi.length}</div></div>
      <div class="stat-card"><div class="stat-label">CV screened</div><div class="stat-value">${cv.length}</div></div>
      <div class="stat-card"><div class="stat-label">Avg COI/CV score</div><div class="stat-value" style="color:${scoreColor(avgScore)}">${avgScore.toFixed(2)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="table-wrap">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">Score distribution</div>
        <div style="padding:16px">
          ${Object.entries(scoreBuckets).map(([k,v])=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="width:70px;font-size:12px;color:var(--text2)">${k}</div>
              <div style="flex:1;height:18px;background:var(--bg3);border-radius:3px;overflow:hidden">
                <div style="width:${(v/maxBucket*100).toFixed(0)}%;height:100%;background:var(--blue);border-radius:3px"></div>
              </div>
              <div style="width:24px;font-size:12px;font-weight:500;text-align:right">${v}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="table-wrap">
        <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">Top sectors</div>
        <div style="padding:16px">
          ${topSectors.map(([s,n])=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="flex:1;font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s}</div>
              <div style="width:80px;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden;flex-shrink:0">
                <div style="width:${(n/maxSec*100).toFixed(0)}%;height:100%;background:var(--green);border-radius:3px"></div>
              </div>
              <div style="width:30px;font-size:12px;font-weight:500;text-align:right">${n}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
    ${top10.length ? `<div class="table-wrap">
      <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em">Top scored deals</div>
      <table><thead><tr><th>Company</th><th>Type</th><th>Sponsor</th><th>Score</th><th>Status</th></tr></thead>
      <tbody>${top10.map(d=>`<tr>
        <td><strong>${esc(d.name)}</strong></td>
        <td><span class="badge badge-${d.type.toLowerCase()}">${d.type}</span></td>
        <td style="color:var(--text2)">${esc(d.sponsor||'')}</td>
        <td style="font-weight:500;color:${scoreColor(d.score)}">${d.score.toFixed(3)}</td>
        <td>${d.status}</td>
      </tr>`).join('')}</tbody></table></div>` : ''}`;
}

// ── EXPORT ────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['Date','Company','Sponsor','HQ','Sector','Type','Status','Score','Rev (m€)','EBITDA (m€)','EV (m€)','Red flags','Comments'];
  const rows = deals.map(d => [
    d.entry_date||'', d.name||'', d.sponsor||'', d.hq||'', d.sector||'',
    d.type||'', d.status||'', d.score||0, d.rev||'', d.ebitda||'', d.ev||'',
    (d.red_flags||[]).join('; '), d.comments||''
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'Haltra_Pipeline_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// ── UTILS ─────────────────────────────────────────────────────
function scoreColor(s) {
  if (s >= 0.7) return 'var(--green)';
  if (s >= 0.6) return 'var(--amber)';
  return s > 0 ? 'var(--red)' : 'var(--text3)';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
